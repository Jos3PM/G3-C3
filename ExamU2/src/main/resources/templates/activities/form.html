<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad - Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f4f8;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .page-header {
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 4px 16px rgba(26,115,232,.25);
        }
        .page-header h1 { font-size: 1.75rem; font-weight: 700; margin: 0; }
        .page-header p { opacity: .8; margin: .25rem 0 0; font-size: .9rem; }
        .form-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,.1);
            max-width: 600px;
            margin: 0 auto;
        }
        .form-card .card-body { padding: 2rem; }
        .form-label {
            font-weight: 600;
            font-size: .85rem;
            color: #495057;
            margin-bottom: .4rem;
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1.5px solid #dee2e6;
            padding: .6rem .9rem;
            font-size: .9rem;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,.15);
        }
        .form-check-input:checked { background-color: #1a73e8; border-color: #1a73e8; }
        .form-check-label { font-size: .9rem; font-weight: 500; }
        .btn-save {
            background: #1a73e8;
            border: none;
            border-radius: 10px;
            padding: .65rem 1.5rem;
            font-weight: 600;
            font-size: .9rem;
            color: white;
            transition: background .2s, transform .1s, box-shadow .2s;
            box-shadow: 0 2px 8px rgba(26,115,232,.3);
        }
        .btn-save:hover {
            background: #1557b0;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(26,115,232,.4);
            color: white;
        }
        .btn-cancel {
            border-radius: 10px;
            padding: .65rem 1.25rem;
            font-weight: 600;
            font-size: .9rem;
        }
        .divider { border-color: #e9ecef; margin: 1.5rem 0; }
        .section-title {
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: #adb5bd;
            font-weight: 700;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<div class="page-header">
    <div class="container">
        <h1>
            <i class="bi bi-calendar-plus me-2" th:if="${activity.id == null}"></i>
            <i class="bi bi-calendar-check me-2" th:unless="${activity.id == null}"></i>
            <span th:if="${activity.id == null}">Nueva Actividad</span>
            <span th:unless="${activity.id == null}">Editar Actividad</span>
        </h1>
        <p th:if="${activity.id == null}">Completa los campos para registrar una nueva actividad</p>
        <p th:unless="${activity.id == null}">Modifica los campos y guarda los cambios</p>
    </div>
</div>

<div class="container mb-5">
    <div class="card form-card">
        <div class="card-body">

            <form th:action="@{/activities/guardar}"
                  th:object="${activity}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <p class="section-title">Informacion General</p>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-tag me-1 text-primary"></i>Nombre
                    </label>
                    <input type="text"
                           th:field="*{name}"
                           class="form-control"
                           placeholder="Nombre de la actividad"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-calendar-event me-1 text-primary"></i>Fecha y Hora
                    </label>
                    <input type="text"
                           th:field="*{datetime}"
                           class="form-control"
                           placeholder="Ej: 2026-06-16 10:30">
                </div>

                <hr class="divider">

                <p class="section-title">Configuracion</p>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-flag me-1 text-primary"></i>Estado
                    </label>
                    <select th:field="*{status}" class="form-select">
                        <option value="">-- Selecciona un estado --</option>
                        <option th:each="s : ${statuses}"
                                th:value="${s}"
                                th:text="${s}">
                        </option>
                    </select>
                </div>

                <div class="mb-4">
                    <div class="form-check form-switch">
                        <input type="checkbox"
                               th:field="*{published}"
                               class="form-check-input"
                               role="switch"
                               id="publishedCheck">
                        <label class="form-check-label" for="publishedCheck">
                            <i class="bi bi-eye me-1"></i>Publicado
                        </label>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-save">
                        <i class="bi bi-floppy me-1"></i>Guardar
                    </button>
                    <a th:href="@{/activities/listar}" class="btn btn-outline-secondary btn-cancel">
                        <i class="bi bi-x-circle me-1"></i>Cancelar
                    </a>
                </div>

            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
