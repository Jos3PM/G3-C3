<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Actividad</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body class="container mt-5">

<div class="card">

    <div class="card-header">
        Registrar Actividad
    </div>

    <div class="card-body">

        <form th:action="@{/activities/guardar}"
              th:object="${activity}"
              method="post">

            <input type="hidden"
                   th:field="*{id}">

            <div class="mb-3">
                <label>Name</label>
                <input type="text"
                       th:field="*{name}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>DateTime</label>
                <input type="text"
                       th:field="*{datetime}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Status</label>

                <select th:field="*{status}"
                        class="form-select">

                    <option th:each="s : ${statuses}"
                            th:value="${s}"
                            th:text="${s}">
                    </option>

                </select>
            </div>

            <div class="form-check mb-3">

                <input type="checkbox"
                       th:field="*{published}"
                       class="form-check-input">

                <label class="form-check-label">
                    Published
                </label>

            </div>

            <button class="btn btn-primary">
                Guardar
            </button>

            <a th:href="@{/activities/listar}"
               class="btn btn-secondary">
                Cancelar
            </a>

        </form>

    </div>

</div>

</body>
</html>
