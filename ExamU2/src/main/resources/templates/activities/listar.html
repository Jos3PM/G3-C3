<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Activities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="container mt-5">

<h2>Lista de Actividades</h2>

<a th:href="@{/activities/nuevo}"
   class="btn btn-success mb-3">
    Nueva Actividad
</a>

<table class="table table-bordered">

    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>DateTime</th>
        <th>Published</th>
        <th>Status</th>
        <th>Acciones</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="a : ${activities}">

        <td th:text="${a.id}"></td>
        <td th:text="${a.name}"></td>
        <td th:text="${a.datetime}"></td>

        <td>
            <span th:if="${a.published}"
                  class="badge bg-success">
                Sí
            </span>

            <span th:unless="${a.published}"
                  class="badge bg-danger">
                No
            </span>
        </td>

        <td th:text="${a.status}"></td>

        <td>
            <a th:href="@{/activities/editar/{id}(id=${a.id})}"
               class="btn btn-warning btn-sm">
                Editar
            </a>

            <a th:href="@{/activities/eliminar/{id}(id=${a.id})}"
               class="btn btn-danger btn-sm">
                Eliminar
            </a>
        </td>

    </tr>

    </tbody>

</table>

</body>
</html>
