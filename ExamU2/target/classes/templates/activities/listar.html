<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activities - Lista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; font-family: 'Segoe UI', system-ui, sans-serif; }
        .page-header {
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            color: white; padding: 2rem 0; margin-bottom: 2rem;
            box-shadow: 0 4px 16px rgba(26,115,232,.25);
        }
        .page-header h1 { font-size: 1.75rem; font-weight: 700; margin: 0; }
        .page-header p { opacity: .8; margin: .25rem 0 0; font-size: .9rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        .table { margin: 0; }
        .table thead th {
            background: #f8f9fa; border-bottom: 2px solid #e9ecef;
            font-weight: 600; font-size: .78rem; text-transform: uppercase;
            letter-spacing: .5px; color: #6c757d; padding: 1rem;
        }
        .table tbody td { padding: .875rem 1rem; vertical-align: middle; border-color: #e9ecef; font-size: .9rem; }
        .table tbody tr { transition: background .15s; }
        .table tbody tr:hover { background: #f0f6ff; }
        .badge-status { padding: .35em .7em; border-radius: 6px; font-size: .75rem; font-weight: 600; }
        .status-PENDING     { background: #fff3cd; color: #856404; }
        .status-IN_PROGRESS { background: #cfe2ff; color: #084298; }
        .status-COMPLETED   { background: #d1e7dd; color: #0a3622; }
        .btn-new {
            background: white; color: #1a73e8; border: 2px solid white;
            border-radius: 10px; padding: .55rem 1.25rem; font-weight: 600;
            font-size: .9rem; text-decoration: none; display: inline-flex;
            align-items: center; gap: .4rem; transition: all .2s;
        }
        .btn-new:hover { background: rgba(255,255,255,.15); color: white; }
        .id-badge { background: #e9ecef; border-radius: 6px; padding: .2em .5em; font-weight: 600; font-size: .8rem; color: #6c757d; }
        .btn-action { border-radius: 8px; padding: .35rem .7rem; font-size: .8rem; }
        .empty-state { text-align: center; padding: 4rem 1rem; color: #6c757d; }
        .empty-state i { font-size: 3rem; opacity: .3; display: block; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="page-header">
    <div class="container">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
            <div>
                <h1><i class="bi bi-calendar3 me-2"></i>Activities</h1>
                <p>Gestiona todas tus actividades registradas</p>
            </div>
            <a th:href="@{/activities/nuevo}" class="btn-new">
                <i class="bi bi-plus-circle-fill"></i> Nueva Actividad
            </a>
        </div>
    </div>
</div>
<div class="container mb-5">
    <div class="card">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(activities)}" class="empty-state">
                <i class="bi bi-inbox"></i>
                <p class="mb-1 fw-semibold">No hay actividades registradas</p>
                <small>Haz clic en "Nueva Actividad" para comenzar</small>
            </div>
            <div th:unless="${#lists.isEmpty(activities)}">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>ID</th><th>Nombre</th><th>Fecha / Hora</th>
                        <th>Publicado</th><th>Estado</th>
                        <th style="width:130px">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a : ${activities}">
                        <td><span class="id-badge" th:text="${a.id}"></span></td>
                        <td class="fw-semibold" th:text="${a.name}"></td>
                        <td><i class="bi bi-clock text-muted me-1" style="font-size:.8rem"></i><span th:text="${a.datetime}" style="font-size:.875rem"></span></td>
                        <td>
                            <span th:if="${a.published}" class="badge bg-success"><i class="bi bi-check-circle-fill me-1"></i>Si</span>
                            <span th:unless="${a.published}" class="badge bg-secondary"><i class="bi bi-dash-circle me-1"></i>No</span>
                        </td>
                        <td><span class="badge-status" th:classappend="'status-' + ${a.status}" th:text="${a.status}"></span></td>
                        <td>
                            <a th:href="@{/activities/editar/{id}(id=${a.id})}" class="btn btn-warning btn-action me-1" title="Editar"><i class="bi bi-pencil-fill"></i></a>
                            <a th:href="@{/activities/eliminar/{id}(id=${a.id})}" class="btn btn-danger btn-action" title="Eliminar" onclick="return confirm('Desea eliminar esta actividad?')"><i class="bi bi-trash-fill"></i></a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="mt-3 text-muted" style="font-size:.8rem" th:unless="${#lists.isEmpty(activities)}">
        Total: <strong th:text="${#lists.size(activities)}"></strong> actividad(es)
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
